name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Download goldlapel binary
        # Download the latest release asset from the private goldlapel/goldlapel
        # repo using the org-level RELEASE_TOKEN PAT (same token used by all
        # release-*.yml workflows). Org secret has visibility=ALL, so it
        # propagates to this public wrapper repo's workflow runs.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo goldlapel/goldlapel --limit 1 --json tagName -q '.[0].tagName')
          gh release download "$LATEST" --repo goldlapel/goldlapel --pattern "goldlapel-linux-x86_64" --dir /tmp
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Run tests
        # Use the runner's pre-installed `mvn` — `mvnw` and `.mvn/` are
        # gitignored in this repo, so the wrapper isn't checked out on CI.
        # Skip GPG signing during CI test runs (release workflow handles
        # signing). Root-level `mvn test` covers all four modules (core,
        # spring-boot, reactor, rxjava3).
        env:
          # Standardized integration-test gate — both must be set for
          # integration tests to run. See IntegrationGate.java in each
          # module's test sources.
          GOLDLAPEL_INTEGRATION: "1"
          GOLDLAPEL_TEST_UPSTREAM: postgresql://postgres:postgres@localhost:5432/postgres
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: mvn test -Dgpg.skip=true
