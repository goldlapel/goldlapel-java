name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Download goldlapel binary
        # Source from the public goldlapel-go repo (which commits binaries for
        # the Go module proxy). Avoids needing a PAT to reach the private
        # goldlapel/goldlapel release assets. raw.githubusercontent.com serves
        # the file on main with no auth required.
        run: |
          curl -fSL -o /tmp/goldlapel-linux-x86_64 \
            https://raw.githubusercontent.com/goldlapel/goldlapel-go/main/bin/goldlapel-linux-x86_64
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Run tests
        # Skip GPG signing during CI test runs (release workflow handles signing).
        # -pl/-am would be needed if we wanted per-module tests; root-level `mvn
        # test` covers all four modules (core, spring-boot, reactor, rxjava3).
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: ./mvnw test -Dgpg.skip=true
